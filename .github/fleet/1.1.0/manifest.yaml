version: "1.1.0"
phase: "Native article plugin hardening + migration foundation"
phase_branch: "phase/1.1.0"
final_merge_target: "origin/main"
merge_policy: "eager-after-green"
updated_at: "2026-05-06"

lanes:
  - id: "01-live-plugin-bootstrap"
    title: "[1.1.0][01-live-plugin-bootstrap] Ensure live AtoM container plugin boot + enable path"
    owned_surface:
      - "Plugin deployment/enable wiring"
      - "Stack/runtime boot checks"
      - "Bootstrap hook correctness"
    readiness: "ready"
    blockers: []
    pr_metadata:
      status: "merged"
      base: "phase/1.1.0"

  - id: "02-php-template-bridge"
    title: "[1.1.0][02-php-template-bridge] Wire native PHP module templates to article form flow"
    owned_surface:
      - "Plugin module PHP actions/templates/partials"
      - "Route-to-template rendering behaviour"
    readiness: "ready"
    blockers: []
    pr_metadata:
      status: "merged"
      base: "phase/1.1.0"

  - id: "03-persistence-migration"
    title: "[1.1.0][03-persistence-migration] Add durable plugin-owned article persistence and link validation"
    owned_surface:
      - "Plugin persistence schema/migration scripts"
      - "Repository/service writes"
      - "Linking enforcement"
    readiness: "ready"
    blockers: []
    pr_metadata:
      status: "merged"
      base: "phase/1.1.0"

  - id: "04-verification-decision"
    title: "[1.1.0][04-verification-decision] Validate parity and client decision gate"
    owned_surface:
      - "Verification scripts/checklist"
      - "Parity evidence artifacts"
      - "Fallback coexistence validation"
      - "Decision summary and recommendation"
    readiness: "ready"
    blockers: []
    pr_metadata:
      status: "open"
      base: "phase/1.1.0"
      artifacts:
        - "docs/verification-checklist-1.1.0.md"
        - "docs/decision-note-1.1.0.md"
        - ".github/fleet/1.1.0/manifest.yaml"

acceptance_gates:
  - id: "AG-01"
    description: "Plugin loads/enables reliably in live AtoM stack with deterministic bootstrap path"
    status: "pass"
  - id: "AG-02"
    description: "Native PHP article screens render through plugin-owned templates with AtoM-conformant interaction behaviour"
    status: "pass"
  - id: "AG-03"
    description: "Article records persist durably (not in-memory only), with link validation behaviour matching contract"
    status: "pass"
  - id: "AG-04"
    description: "Hosted fallback remains available during this phase"
    status: "pass"
  - id: "AG-05"
    description: "Cutover recommendation includes risks, rollback path, and explicit go/no-go decision"
    status: "pass"

decision:
  outcome: "approve-native-continuation"
  summary: "All 1.1.0 acceptance gates passed. No core AtoM modifications. Hosted fallback unaffected. Recommend merging phase/1.1.0 to origin/main and opening 1.2.0 planning for full migration."
  next_slice: "1.2.0 (or 2.0.0 if breaking migration required)"
  documents:
    - "docs/verification-checklist-1.1.0.md"
    - "docs/decision-note-1.1.0.md"
